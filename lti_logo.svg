<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3B1E"/>
      <stop offset="100%" stop-color="#FFA05A"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="15" y="15" width="470" height="470" rx="40" ry="40" fill="url(#grad)" stroke="#000000" stroke-width="14"/>

  <!-- L -->
  <line x1="120" y1="168" x2="120" y2="335" stroke="#000000" stroke-width="40" stroke-linecap="round"/>
  <line x1="120" y1="335" x2="205" y2="335" stroke="#000000" stroke-width="40" stroke-linecap="round"/>

  <!-- T -->
  <line x1="228" y1="168" x2="340" y2="168" stroke="#000000" stroke-width="40" stroke-linecap="round"/>
  <line x1="284" y1="168" x2="284" y2="335" stroke="#000000" stroke-width="40" stroke-linecap="round"/>

  <!-- | pipe — thinner, further from T -->
  <line x1="388" y1="155" x2="388" y2="348" stroke="#000000" stroke-width="22" stroke-linecap="round"/>
</svg>
